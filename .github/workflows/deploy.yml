# =============================================================
# La Brigade du Code — Deploy
# Builds VitePress docs + reveal.js slides → GitHub Pages
# Slides hosted at: maoudia.github.io/la-brigade-du-code/slides/
# The kitchen that deploys itself 🤌
# =============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs + Slides
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          version: "2026.4.8"
          install: true
          cache: true
          cache_key: "mise-v1-{{platform}}-{{version}}-{{file_hash}}"
          experimental: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: |
          mise run install-docs
          mise run slides:install

      - name: Build VitePress docs
        run: mise run docs:build

      - name: Build reveal.js slides
        run: mise run slides:build

      - name: Merge slides into docs output
        run: |
          mkdir -p docs/.vitepress/dist/slides
          cp -r slides/_dist/* docs/.vitepress/dist/slides/
          echo "✓ Slides available at /slides/"

      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
